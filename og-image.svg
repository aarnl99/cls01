<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="80%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#1e1a1a"/>
      <stop offset="100%" stop-color="#111110"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C41E1E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C41E1E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="315" r="320" fill="url(#glow)"/>
  <!-- Globe mark large -->
  <g transform="translate(80,165)">
    <circle cx="150" cy="150" r="148" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <ellipse cx="150" cy="150" rx="62" ry="148" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <line x1="2" y1="150" x2="298" y2="150" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <line x1="14" y1="90" x2="286" y2="90" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
    <line x1="14" y1="210" x2="286" y2="210" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
    <text x="150" y="168" font-family="IBM Plex Sans,Arial,sans-serif" font-weight="800" font-size="52" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="6">CLS</text>
  </g>
  <!-- Red accent bar -->
  <rect x="380" y="218" width="6" height="194" rx="3" fill="#C41E1E"/>
  <!-- Wordmark -->
  <text x="410" y="310" font-family="IBM Plex Sans,Arial,sans-serif" font-weight="800" font-size="88" fill="#C41E1E" letter-spacing="-2">CLS Global</text>
  <text x="413" y="374" font-family="IBM Plex Sans,Arial,sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.45)" letter-spacing="10">TRANSPORTATION</text>
  <!-- Tagline -->
  <text x="413" y="448" font-family="IBM Plex Sans,Arial,sans-serif" font-weight="300" font-size="22" fill="rgba(255,255,255,0.3)" letter-spacing="1">Bay Area's Premier Shuttle Partner</text>
  <!-- Bottom red bar -->
  <rect x="0" y="614" width="1200" height="16" fill="#C41E1E"/>
</svg>
